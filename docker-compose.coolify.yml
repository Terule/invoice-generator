services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "3000"
      DB_USER: ${DB_USER:-invoice_user}
      DB_PASSWORD: ${DB_PASSWORD:-change-this-password}
      DB_NAME: ${DB_NAME:-invoice_generator}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DATABASE_URL: ${DATABASE_URL:-mysql://${DB_USER:-invoice_user}:${DB_PASSWORD:-change-this-password}@${DB_HOST:-mysql}:${DB_PORT:-3306}/${DB_NAME:-invoice_generator}}
      AUTH_URL: ${AUTH_URL:-https://invoices.terule.dev.br}
      AUTH_SECRET: ${AUTH_SECRET:-replace-with-a-long-random-secret}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-false}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-replace-me}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-replace-me}
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-root-password}
      MYSQL_DATABASE: ${DB_NAME:-invoice_generator}
      MYSQL_USER: ${DB_USER:-invoice_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-this-password}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-change-root-password}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mysql-data:
