services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "3000"
      DB_USER: ${DB_USER:-invoice_user}
      DB_PASSWORD: ${DB_PASSWORD:-change-this-password}
      DB_NAME: ${DB_NAME:-invoice_generator}
      DB_HOST: mysql
      DB_PORT: "3306"
      SEAWEEDFS_URL: http://seaweedfs:8888
      AUTH_URL: ${AUTH_URL:-https://invoices.terule.dev.br}
      AUTH_SECRET: ${AUTH_SECRET:-replace-with-a-long-random-secret}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-false}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-replace-me}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-replace-me}
    expose:
      - "3000"
    depends_on:
      mysql:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-root-password}
      MYSQL_DATABASE: ${DB_NAME:-invoice_generator}
      MYSQL_USER: ${DB_USER:-invoice_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-this-password}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-change-root-password}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  seaweedfs:
    image: chrislusf/seaweedfs:3.90
    command: server -dir=/data -filer
    expose:
      - "8888"
    volumes:
      - seaweedfs-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8888/"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 45s
    restart: unless-stopped

volumes:
  mysql-data:
  seaweedfs-data:
