services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.local
    environment:
      DB_USER: ${DB_USER:-invoice_user}
      DB_PASSWORD: ${DB_PASSWORD:-invoice_password}
      DB_NAME: ${DB_NAME:-invoice_generator}
      DB_HOST: mysql
      DB_PORT: "3306"
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
      mysql-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

  mysql-setup:
    image: mysql:8.4
    env_file:
      - .env.local
    environment:
      MYSQL_ROOT_PASSWORD: root
      DB_USER: ${DB_USER:-invoice_user}
      DB_PASSWORD: ${DB_PASSWORD:-invoice_password}
      DB_NAME: ${DB_NAME:-invoice_generator}
      DB_HOST: mysql
      DB_PORT: "3306"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./docker/mysql-setup.sh:/docker/mysql-setup.sh:ro
    command: ["sh", "/docker/mysql-setup.sh"]
    restart: "no"

  mysql:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ${DB_NAME:-invoice_generator}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql-data:
